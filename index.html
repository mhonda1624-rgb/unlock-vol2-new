<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>UNLOCK vol.2</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #efe8dc;
      font-family: -apple-system, BlinkMacSystemFont,
        "Hiragino Sans", "Yu Gothic", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 16px 10px;
      font-size: 18px;
      color: #27364a;
    }

    .page {
      width: min(94vw, 700px);
      height: calc(100vh - 80px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .page img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .error {
      color: #b00020;
      text-align: center;
    }
  </style>
</head>

<body>

  <h1>UNLOCK vol.2</h1>

  <div class="page" id="page">
    <img src="./vol.2表紙.png" alt="UNLOCK vol.2 表紙">
  </div>

  <script>
    const image = document.querySelector("#page img");

    image.onerror = function () {
      document.getElementById("page").innerHTML =
        '<p class="error">cover.pngを読み込めませんでした。</p>';
    };
  </script>

</body>
</html>
